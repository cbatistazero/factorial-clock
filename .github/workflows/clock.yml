name: Factorial Clock

on:
  schedule:
    - cron: "0 7 * * 1-5"
    - cron: "0 16 * * 1-5"

jobs:
  clock:
    runs-on: ubuntu-latest

    steps:
      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps

      - name: Run script
        env:
          EMAIL: ${{ secrets.FACTORIAL_EMAIL }}
          PASSWORD: ${{ secrets.FACTORIAL_PASSWORD }}
        run: |
          cat << 'EOF' > script.js
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto('https://app.factorialhr.com/dashboard');

            // Login
            await page.fill('input[type="email"]', process.env.EMAIL);
            await page.fill('input[type="password"]', process.env.PASSWORD);
            await page.click('button[type="submit"]');

            await page.waitForTimeout(5000);

            // Click clock button (may need adjustment)
            await page.click('button:has-text("Clock")');

            await page.waitForTimeout(3000);
            await browser.close();
          })();
          EOF

          node script.js
